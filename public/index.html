<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Local Chat</title>
    <!-- यहाँ गड़बड़ थी, अब सही CSS पाथ सेट कर दिया है -->
    <link rel="stylesheet" href="/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2><i class="fa-brands fa-rocketchat"></i> Local Connect</h2>
        </header>

        <main class="chat-box" id="chat-box">
            <!-- Messages will appear here -->
        </main>

        <div class="input-area">
            <input type="file" id="file-input" hidden>
            <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Attach File">
                <i class="fa-solid fa-paperclip"></i>
            </button>
            <button class="icon-btn" id="record-btn" title="Voice Message">
                <i class="fa-solid fa-microphone"></i>
            </button>
            
            <input type="text" id="message-input" placeholder="Type a message...">
            
            <button class="send-btn" id="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js"></script>
</body>
</html>
